name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request. Focus on correctness bugs, security
            issues, and clear simplifications. Be concise. Post inline
            comments only for concrete, high-confidence findings, and leave
            one short summary comment. This repo is a Python data-collector
            framework — respect its existing conventions.
          claude_args: |
            --model claude-sonnet-5
