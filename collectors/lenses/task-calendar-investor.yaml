apiVersion: collectorx/v1
kind: Collector
id: task-calendar-investor
display_name: 投资任务日历 Lens
refresh_interval: 6h
mode: snapshot
time_field: time
armed: false
category: lens
owner_scope: personal
upstream_collectors:
  - ticktick
  - calendar
skill: investor-source-collectors

scope:
  consumes:
    - lake/ticktick/events.jsonl
    - lake/calendar/events.jsonl
  collects:
    - research_tasks
    - trade_plans
    - earnings_calendar
    - review_reminders
    - risk_checks
    - research_meetings
    - task_calendar_surface
    - upstream_collector_surface
    - time_and_reminder_surface
  excludes:
    - full_life_calendar
    - unrelated_tasks
    - credentials

description: |
  滴答清单和日历作为通用任务通道。本 lens 只筛投资研究、交易计划和复盘提醒，
  并在 manifest/evidence 中汇总研究任务、交易计划、复盘提醒、财报日程、调研会议和风险检查面谱。
