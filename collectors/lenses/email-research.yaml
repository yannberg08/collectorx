apiVersion: collectorx/v1
kind: Collector
id: email-research
display_name: 邮件研报 Lens
refresh_interval: 6h
mode: incremental
time_field: date
armed: false
category: lens
owner_scope: personal
upstream_collectors:
  - email
skill: investor-source-collectors

scope:
  consumes:
    - lake/email/events.jsonl
  collects:
    - broker_research_emails
    - morning_meetings
    - roadshow_invites
    - company_ir_threads
    - research_attachment_refs
    - earnings_announcement_alerts
    - email_research_surface_summary
    - email_research_boundary_proof
    - sender_domain_counts
    - body_preview_boundary
    - attachment_ref_boundary
    - email_research_scope_policy
    - scope_policy_filtered_all_readiness
    - validator_safe_profile_gap_package
    - authorization_scope_boundary
  excludes:
    - mailbox_credentials
    - unrelated_private_email
    - full_body_in_wiki_by_default
    - attachment_bodies

description: |
  邮箱原始采集由 email collector 负责。本 lens 只筛券商、研报、调研和投资项目邮件。
  附件文件名含研报、深度报告、晨会、调研、路演、纪要、财报等特征时，可作为
  邮件研报证据；附件正文仍不进入事件。manifest 会输出邮件投研面谱
  email_research_surface_summary 和 email_research_boundary_proof，说明晨会、
  研报、路演邀请、IR 往来、公告提醒、附件引用、正文预览和邮箱边界。
  可通过 --allow-email-sender-domain/--deny-email-sender-domain、
  --allow-email-folder/--deny-email-folder、--allow-email-mailbox/--deny-email-mailbox、
  --allow-email-subject/--deny-email-subject、--allow-email-attachment/--deny-email-attachment、
  --allow-email-surface/--deny-email-surface、--allow-email-keyword/--deny-email-keyword
  收窄用户授权范围；filtered-all 时输出 validator-safe profile gap package，
  不会伪造可用邮件研报证据。
