apiVersion: collectorx/v1
kind: Collector
id: wechat-investment-dialogue
display_name: 微信投资讨论 Lens
refresh_interval: 6h
mode: incremental
time_field: time
armed: false
category: lens
owner_scope: personal
upstream_collectors:
  - wechat
skill: investor-source-collectors

scope:
  consumes:
    - lake/wechat/events.jsonl
  collects:
    - investment_discussions
    - buy_sell_reasons
    - consultation_network
    - emotion_signals
    - source_policy_audit
    - contact_group_sender_allowlist
    - source_policy_filtered_gap
  excludes:
    - raw_wechat_database_access
    - non_investment_private_chats
    - account_assets
    - source_policy_as_investment_assertion

description: |
  这是投资分身 lens，不是新的微信数据库采集器。微信原始消息由 wechat 采集器负责；
  本 lens 只从 lake 中筛选投资相关对话并路由到 investor Wiki 证据包。
  FinClaw 可传入 --allow-chat/--deny-chat/--allow-sender/--deny-sender 收窄
  联系人、群和发送者范围；范围策略只做过滤，不自动证明投资相关。
