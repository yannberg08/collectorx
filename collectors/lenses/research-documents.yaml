apiVersion: collectorx/v1
kind: Collector
id: research-documents
display_name: 本地投研文档 Lens
refresh_interval: 12h
mode: snapshot
time_field: mtime
armed: false
category: lens
owner_scope: personal
upstream_collectors:
  - filesystem
  - notes
skill: investor-source-collectors

scope:
  consumes:
    - lake/filesystem/events.jsonl
    - lake/notes/events.jsonl
  collects:
    - research_reports
    - financial_statements
    - announcement_annotations
    - valuation_models
    - screenshots
    - path_level_collection_audit
    - missing_input_audit
    - skipped_reason_counts
    - screenshot_metadata_only_policy
    - optional_image_ocr_policy
    - research_document_surface_summary
    - research_corpus_boundary_proof
    - extension_path_file_name_parser_surface_keyword_scope_policy
    - scope_policy_filtered_all_readiness
    - validator_safe_scope_policy_gap_packages
    - research_document_event_count
    - gap_event_count
  excludes:
    - whole_disk_scan
    - unrelated_private_files
    - public_report_database_crawl
    - credential_or_cookie_material

content_policy:
  generic_filesystem_metadata_only: true
  content_read_requires_explicit_include_content: true
  supported_content_extract_extensions:
    - .docx
    - .pdf
    - .xlsx
    - .xlsm
    - .xls
    - .pptx
  legacy_xls_parser_variants:
    - openpyxl-renamed-xls
    - legacy-xls-html
    - legacy-xls-xml
    - legacy-xls-delimited
    - legacy-xls-text
    - xlrd-biff
  binary_xls_biff_requires_xlrd: true
  binary_xls_without_xlrd_records_extract_failed: true
  supported_metadata_only_extensions:
    - .doc
    - .ppt
    - .png
    - .jpg
    - .jpeg
    - .webp
    - .heic
  screenshots_are_metadata_only_without_image_ocr: true
  image_ocr_requires_explicit_include_image_ocr: true
  image_ocr_engine_required: tesseract
  ocr_performed_by_default: false
  unsupported_extensions_are_skipped: true
  writes_final_wiki_directly: false

description: |
  本 lens 不重新扫描硬盘。它消费 filesystem/notes 的已授权文件元数据，
  筛选投研文档并把 raw_ref 路由到投资分身。若用户显式授权
  --include-content，可读取 DOCX/PDF/XLSX/XLSM/XLS/PPTX 的正文、表格或幻灯片文本，
  其中 `.xls` 会区分 XML Spreadsheet、HTML table、text/delimited、renamed OOXML
  和 binary BIFF；binary BIFF 只有本机安装 xlrd 时读取，否则写入 extract_failed 审计，
  若用户另行显式传入 --include-image-ocr 且本机有 tesseract，可读取
  截图/图片里的文字；没有 OCR 引擎时会保留 metadata-only 事件并在
  manifest 中记录降级原因。
  但仍只写 CollectorX lake 与 investor_wiki_evidence.v1 证据包。
  manifest 会记录缺失输入、逐文件解析结果、跳过原因、limit 截断、研究语料面谱、
  research_corpus_boundary_proof 和截图 OCR/metadata-only 边界。若授权输入缺失、
  不可读、未命中投资证据，或扩展名/路径/文件名/解析器/研究主题/关键词策略过滤后全空，
  会输出 validator-safe profile gap 事件，路由到 collectorx.data_quality.collection_gaps，
  并在 manifest 中拆分 research_document_event_count、usable_event_count 和 gap_event_count。
