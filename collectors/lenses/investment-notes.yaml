apiVersion: collectorx/v1
kind: Collector
id: investment-notes
display_name: 投资笔记 Lens
refresh_interval: 12h
mode: snapshot
time_field: updated_at
armed: false
category: lens
owner_scope: personal
upstream_collectors:
  - notes
skill: investor-source-collectors

scope:
  consumes:
    - lake/notes/events.jsonl
  collects:
    - investment_notes
    - review_notes
    - rules_library
    - trade_checklists
    - valuation_assumptions
    - investment_note_type_surface
    - source_app_surface
    - preview_vs_full_content_surface
    - investment_note_boundary_proof
  excludes:
    - all_life_notes
    - note_service_tokens
    - unrelated_knowledge_base

description: |
  笔记应用本身是通用采集器。本 lens 只筛 Obsidian、Notion、有道云、印象笔记中的投资笔记，
  并把复盘、规则库、交易 checklist、估值假设、研究记录等投资笔记子类型写入
  manifest/evidence 的 surface summary。manifest 同时输出 investment_note_boundary_proof，
  记录来源应用、预览/全文、标签/路径/URL、候选/命中/过滤数量，并明确不声明完整笔记库。
