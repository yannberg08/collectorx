apiVersion: collectorx/v1
kind: Collector
id: wechat-article-favorites
display_name: 投资公众号收藏 Lens
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: lens
owner_scope: personal
upstream_collectors:
  - wechat-favorites
skill: investor-source-collectors

scope:
  consumes:
    - lake/wechat-favorites/events.jsonl
  collects:
    - investment_public_account_articles
    - saved_articles
    - shared_articles
    - read_articles
    - article_action_surface
    - broker_research_articles
    - company_fundamental_articles
    - market_strategy_articles
    - industry_theme_articles
    - valuation_method_articles
    - portfolio_case_articles
    - risk_warning_articles
    - macro_policy_articles
    - source_authors
    - article_ids
    - favorite_reasons
    - share_targets
    - read_duration_progress
    - symbol_mentions
    - engagement_counters
    - behavior_boundary_proof
    - wechat_article_boundary_proof
  excludes:
    - public_account_full_crawl
    - non_investment_favorites
    - non_owner_read_history

description: |
  微信收藏/公众号通用采集器负责用户动作。本 lens 只筛投资类公众号、炒股文章和收藏来源，
  并汇总文章面谱、用户动作、行为强度、标的线索、公众号来源类型和文章边界证明，供投资分身 Wiki 使用。
  它不声明完整微信收藏、完整阅读历史、公众号全文爬取或公开文章镜像。
