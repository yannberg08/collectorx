apiVersion: collectorx/v1
kind: Collector
id: dingtalk
display_name: 钉钉消息
skill: collaboration-exports
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
event_template: "[{time}] 〈{sender}〉: {text}"
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false
category: generic
owner_scope: personal

scope:
  collects:
    - messages
    - chats
    - contacts
    - files_refs
    - meeting_refs
    - field_coverage_manifest
    - collaboration_surface_summary
    - source_audit_manifest
    - collaboration_scope_policy_audit
    - source_platform_allow_deny_filters
    - record_kind_allow_deny_filters
    - chat_allow_deny_filters
    - sender_allow_deny_filters
    - participant_allow_deny_filters
    - keyword_allow_deny_filters
    - archive_member_provenance
    - archive_member_skip_audit
    - path_level_collection_audit
  excludes:
    - investment_classification
    - password
    - session_token
    - unauthorized_workspace_data
    - file_body_mirroring
    - archive_path_traversal_members
    - windows_drive_path_archive_members

prompt: |
  使用 collaboration-exports skill 采集用户授权的钉钉本地导出。
  CLI: python3 skills/collaboration-exports/scripts/collaboration_exports.py collect --platform dingtalk --input <authorized-export> --out-dir <out>
  只输出通用协作事件；manifest 记录字段覆盖、协作面、授权范围过滤、ZIP 来源审计、跳过成员原因和逐文件解析结果；投资讨论由后续 lens 筛选。
