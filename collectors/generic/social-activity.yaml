apiVersion: collectorx/v1
kind: Collector
id: social-activity
display_name: 社交平台用户活动
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: generic
owner_scope: personal
skill: social-activity

scope:
  channels:
    - weibo
    - bilibili
    - xiaohongshu
  collects:
    - follows
    - likes
    - favorites
    - watch_history
    - comments
    - shares
    - browser_history_visits
    - browser_history_source_apps
    - browser_history_domain_filtering
    - engagement_counts
    - social_topics
    - social_topic_summary
    - platform_coverage_manifest
    - action_coverage_manifest
    - weak_signal_field_coverage_manifest
    - influence_surface_summary
    - social_activity_boundary_proof
    - usable_event_count
    - social_activity_event_count
    - gap_event_count
    - social_activity_data_quality_lens_readiness_gates
    - platform_action_source_app_domain_creator_topic_keyword_scope_policy
    - scope_policy_filtered_all_readiness
    - filtered_all_data_quality_gap_package
    - no_input_data_quality_gap_package
    - source_audit_manifest
    - path_level_collection_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
    - content_policy_manifest
    - weak_evidence_policy_manifest
  excludes:
    - platform_wide_scraping
    - full_creator_profile_scraping
    - unrelated_entertainment_in_investor_wiki
    - credentials
    - archive_path_traversal_members
    - windows_drive_path_archive_members

description: |
  微博、B站、小红书等平台的通用用户活动采集器。它不判断投资含义；
  支持授权 JSON/CSV/Excel/HTML/TXT/ZIP 活动包和 Chromium/Safari 浏览器历史副本，
  并报告平台/动作/弱证据字段覆盖、浏览器历史来源、社交影响主题面谱、影响源可用面、
  gap/usable/social-activity 计数、social-activity/data-quality/social-investment-lens readiness gates、
  平台/动作/来源应用/域名/创作者/主题/关键词授权范围过滤、validator-safe filtered-all/no-input data-quality gap package、
  社交活动边界证明、逐输入来源审计、跳过文件/ZIP 成员原因和内容策略。
  social-investment-influence lens 再筛选投资内容影响源。
