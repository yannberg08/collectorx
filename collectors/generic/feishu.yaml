apiVersion: collectorx/v1
kind: Collector
id: feishu
display_name: 飞书消息
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
event_template: "[{time}] 〈{sender}〉: {text}"
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false

prompt: |
  使用feishu-lark skill导出飞书消息。
  解析JSON格式，提取：sender/chat/time/content
  输出格式：JSON数组
