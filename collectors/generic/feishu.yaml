apiVersion: collectorx/v1
kind: Collector
id: feishu
display_name: 飞书消息
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
event_template: "[{time}] 〈{sender}〉: {text}"
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false

# 采集器使用的skill
skill: feishu

# 采集逻辑由skill定义
# skill会处理：API认证、消息获取、数据导出
