apiVersion: collectorx/v1
kind: Collector
id: wecom
display_name: 企业微信
skill: collaboration-exports
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false
category: generic
owner_scope: personal

scope:
  collects:
    - messages
    - chats
    - contacts
    - files_refs
    - meeting_refs
    - field_coverage_manifest
    - collaboration_surface_summary
    - source_audit_manifest
    - collaboration_scope_policy_audit
    - source_platform_allow_deny_filters
    - record_kind_allow_deny_filters
    - chat_allow_deny_filters
    - sender_allow_deny_filters
    - participant_allow_deny_filters
    - keyword_allow_deny_filters
    - archive_member_provenance
    - archive_member_skip_audit
    - path_level_collection_audit
  excludes:
    - investment_classification
    - password
    - session_token
    - unauthorized_workspace_data
    - file_body_mirroring
    - archive_path_traversal_members
    - windows_drive_path_archive_members

description: |
  企业微信通用通信采集器。它只负责用户授权的企业微信消息、会话、联系人、文件指针和会议指针。
  manifest 会记录字段覆盖、协作面、授权范围过滤、ZIP 来源审计、跳过成员原因和逐文件解析结果；投资讨论、调研协作和会议纪要分别由 investor lens 从 lake 中筛选。
