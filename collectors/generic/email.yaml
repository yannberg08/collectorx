apiVersion: collectorx/v1
kind: Collector
id: email
display_name: 邮箱邮件
refresh_interval: 1h
mode: incremental
time_field: date
armed: false
category: generic
owner_scope: personal
local_only: true

skill: email-collector

scope:
  channels:
    - imap
    - local_email_export
    - local_email_scan
    - apple_mail_emlx
    - maildir
    - thunderbird_mbox
    - local_email_export_zip
  collects:
    - message_headers
    - sender_recipients
    - subject
    - date
    - body_preview
    - attachment_refs
    - imap_account_folder_audit
    - local_import_path_level_audit
    - local_scan_provenance
    - missing_input_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
    - apple_mail_emlx_audit
    - maildir_message_audit
    - thunderbird_mbox_audit
    - local_scan_root_status_audit
    - field_coverage
    - archive_member_provenance
    - email_authorization_scope_policy_audit
    - scope_policy_filtered_all_readiness
    - validator_safe_filtered_all_gap_package
    - validator_safe_no_input_gap_package
    - email_event_count
    - gap_event_count
    - mailbox_boundary_proof
  excludes:
    - mailbox_passwords
    - app_passwords
    - oauth_tokens
    - full_body_by_default
    - attachment_bodies
    - archive_path_traversal_members

description: |
  邮箱是通用个人证据源。它采集用户授权邮箱、本机邮箱目录或本地邮件导出中的邮件头、
  正文预览和附件引用；manifest 记录账户/文件夹审计、逐输入导入审计、
  本机扫描审计、跳过文件/ZIP 成员原因、邮箱授权范围策略、正文/附件策略和邮箱边界证明。
  授权范围策略只限定本轮采集边界，不判断投资相关性；投资相关筛选由 `email-research` lens 完成。

prompt: |
  IMAP 采集：
    python3 skills/email-collector/scripts/email_api.py collect \
      --account all \
      --out-dir <输出目录>

  本机授权扫描：
    python3 skills/email-collector/scripts/email_api.py import \
      --local-scan \
      --container-root <用户授权的本机邮箱目录> \
      --out-dir <输出目录>

  本地授权导入：
    python3 skills/email-collector/scripts/email_api.py import \
      --input <用户授权的 EML/EMLX/Maildir/MBOX/JSON/CSV/ZIP 邮件导出文件或目录> \
      --out-dir <输出目录>

  可选授权范围参数：
    --allow-mailbox/--deny-mailbox <邮箱账号>
    --allow-folder/--deny-folder <文件夹>
    --allow-sender/--deny-sender <发件人或发件地址>
    --allow-sender-domain/--deny-sender-domain <发件域名>
    --allow-recipient/--deny-recipient <收件人或抄送人>
    --allow-subject/--deny-subject <主题关键词>
    --allow-attachment/--deny-attachment <附件名关键词>
    --allow-keyword/--deny-keyword <主题/正文预览/联系人/附件名关键词>

  IMAP 和本地导入都会输出 lake/email/events.jsonl、manifest.json、
  SUMMARY.md。默认只输出 body_preview 和 attachment_refs；除非用户显式
  授权 --event-include-body，否则不把完整正文写入事件。ZIP 包保留
  archive.zip::member 来源，并跳过路径穿越成员；本机扫描会在 probe、manifest
  和 raw_ref 中掩码路径里的邮箱地址和长数字账号片段；Apple Mail EMLX 会剥离本地
  长度前缀后解析，Maildir 只采 cur/new 下的 RFC822 邮件文件，Thunderbird 只采
  Mail/ImapMail 下或带 .msf 旁路证明的无后缀 mbox，并把 .msf 索引作为跳过原因记录。
  本机扫描/本地导入 manifest 记录缺失输入、逐文件解析结果、跳过原因、Apple Mail/Maildir/Thunderbird 计数、
  授权范围策略、filtered-all 状态、validator-safe profile gap package、email/gap event count、
  limit 截断和 mailbox_boundary_proof。投资相关筛选必须交给 email-research lens。
