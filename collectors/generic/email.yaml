apiVersion: collectorx/v1
kind: Collector
id: email
display_name: 邮箱邮件
refresh_interval: 1h
mode: incremental
time_field: date
armed: false
category: generic
owner_scope: personal
local_only: true

skill: email-collector

scope:
  channels:
    - imap
    - local_email_export
    - local_email_export_zip
  collects:
    - message_headers
    - sender_recipients
    - subject
    - date
    - body_preview
    - attachment_refs
    - imap_account_folder_audit
    - field_coverage
    - archive_member_provenance
  excludes:
    - mailbox_passwords
    - app_passwords
    - oauth_tokens
    - full_body_by_default
    - attachment_bodies
    - archive_path_traversal_members

description: |
  邮箱是通用个人证据源。它采集用户授权邮箱或本地邮件导出中的邮件头、
  正文预览和附件引用；投资相关筛选由 `email-research` lens 完成。

prompt: |
  IMAP 采集：
    python3 skills/email-collector/scripts/email_api.py collect \
      --account all \
      --out-dir <输出目录>

  本地授权导入：
    python3 skills/email-collector/scripts/email_api.py import \
      --input <用户授权的 EML/MBOX/JSON/CSV/ZIP 邮件导出文件或目录> \
      --out-dir <输出目录>

  IMAP 和本地导入都会输出 lake/email/events.jsonl、manifest.json、
  SUMMARY.md。默认只输出 body_preview 和 attachment_refs；除非用户显式
  授权 --event-include-body，否则不把完整正文写入事件。ZIP 包保留
  archive.zip::member 来源，并跳过路径穿越成员。投资相关筛选必须交给
  email-research lens。
