apiVersion: collectorx/v1
kind: Collector
id: filesystem
display_name: 本地文件
refresh_interval: 6h
driver: filesystem
armed: false
category: generic
owner_scope: personal
skill: filesystem-collector

scope:
  collects:
    - file_path
    - file_name
    - extension
    - size
    - mtime
    - source_audit_manifest
    - skipped_reason_counts
    - root_results
    - filesystem_scope_policy
    - scope_policy_filtered_all_gap_package
    - no_metadata_gap_package
    - filesystem_boundary_proof
  excludes:
    - file_content_by_default
    - whole_disk_scan
    - credentials
    - cache_and_build_artifacts

filesystem:
  extra_roots: []
  extra_ignore_dirs: []
  extensions: []
  max_size_mb: 0

description: |
  本地文件通用采集器。对齐 SoulMirror driver=filesystem 的已验证边界：
  默认只采用户授权目录中的文档元数据，不读正文。投资分身需要的研报、
  财报、PDF、Excel、估值表，由 research-documents lens 从 filesystem lake 中筛选。
  manifest.source_audit 会记录授权根、扩展名覆盖、跳过原因和逐根目录结果，
  便于 FinClaw 判断本次本地文件材料采集覆盖面。可选 filesystem_scope_policy
  支持按扩展名、路径、文件名、目录名和元数据关键词收窄用户授权范围；
  filtered-all 或无可用文件元数据时会输出 profile gap 事件。filesystem_boundary_proof
  汇总 metadata-only、非全盘扫描和授权边界证明。
