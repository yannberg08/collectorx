apiVersion: collectorx/v1
kind: Collector
id: filesystem
display_name: 本地文件
refresh_interval: 6h
driver: filesystem
armed: false
category: generic
owner_scope: personal
skill: filesystem-collector

scope:
  collects:
    - file_path
    - file_name
    - extension
    - size
    - mtime
  excludes:
    - file_content_by_default
    - whole_disk_scan
    - credentials
    - cache_and_build_artifacts

filesystem:
  extra_roots: []
  extra_ignore_dirs: []
  extensions: []
  max_size_mb: 0

description: |
  本地文件通用采集器。对齐 SoulMirror driver=filesystem 的已验证边界：
  默认只采用户授权目录中的文档元数据，不读正文。投资分身需要的研报、
  财报、PDF、Excel、估值表，由 research-documents lens 从 filesystem lake 中筛选。
