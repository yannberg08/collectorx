apiVersion: collectorx/v1
kind: Collector
id: ticktick
display_name: 滴答清单
refresh_interval: 15m
mode: snapshot
armed: false

# 采集器使用的skill
skill: ticktick-cli

scope:
  collects:
    - task_title
    - task_content_preview
    - project_name
    - due_time
    - completion_status
    - tags
    - source_app
    - platform_coverage_manifest
    - field_coverage_manifest
    - time_status_summary
    - source_audit_manifest
    - archive_member_provenance
    - archive_member_skip_audit
    - path_level_collection_audit
  excludes:
    - oauth_token
    - application_secret
    - investment_classification
    - full_life_tasks_in_investor_wiki
    - archive_path_traversal_members
    - windows_drive_path_archive_members

# 采集逻辑由 skill 定义。
# ticktick_cli.py 处理 API 认证和任务获取；ticktick_events.py 把用户授权 JSON/ZIP 导出转成 lake/ticktick/events.jsonl，并在 manifest 中记录字段覆盖、时间状态、ZIP 跳过成员原因、逐文件解析结果和来源审计。
# 投资分身只通过 task-calendar-investor lens 筛交易计划、复盘提醒和研究任务。
