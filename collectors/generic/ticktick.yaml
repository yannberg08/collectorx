apiVersion: soulmirror/v1
kind: Collector
id: ticktick
display_name: 滴答清单
refresh_interval: 15m
mode: snapshot
time_field: due
armed: false
skill: ticktick-cli

prompt: |
  Use the ticktick-cli skill to collect the user's authorized TickTick/Dida tasks.

  SoulMirror owns scheduling, diffing, event writing, and lake paths. This skill
  must only fetch task data and return one JSON array to AgentRunner.

  First check authorization:
    python <SKILL_DIR>/scripts/auth.py status --json

  If authorization is missing, do not return [] and do not fabricate a task.
  Fail clearly with error `ticktick_auth_required` so the product can ask the
  user to connect TickTick first.

  If authorization exists, run:
    python <SKILL_DIR>/scripts/collect_for_soulmirror.py

  Return exactly the JSON array printed by that command. Each item should keep a
  stable `id` and a `data` object with the raw task fields. Do not write
  lake/ticktick/events.jsonl, manifest.json, or SUMMARY.md from the skill; the
  SoulMirror daemon will diff the snapshot and append events itself.
