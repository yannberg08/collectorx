apiVersion: soulmirror/v1
kind: Collector
id: ticktick
display_name: 滴答清单
refresh_interval: 15m
mode: snapshot
time_field: due
armed: false
skill: ticktick-cli

prompt: |
  Use the ticktick-cli skill to collect the user's authorized TickTick/Dida tasks.

  SoulMirror owns scheduling, diffing, event writing, and lake paths. This skill
  must only fetch task data and return one JSON array to AgentRunner.
  During collection, do not start an OAuth flow, do not open a browser, and do
  not run auth.py connect / register / authorize. Authorization is a separate
  user-facing product action.

  First check authorization:
    python <SKILL_DIR>/scripts/auth.py status --json

  If authorization is missing, do not return [] and do not fabricate a task.
  Do not write an error object into the result file. Leave the result file
  empty/absent and make the final AgentRunner reply exactly:
    TICKTICK_AUTH_REQUIRED 需要先通过“连接滴答清单”完成 OAuth 授权。

  If authorization exists, run:
    python <SKILL_DIR>/scripts/collect_for_soulmirror.py

  For user-authorized offline export imports handled by CollectorX rather than
  the daemon snapshot path, `ticktick_events.py collect` supports source-app,
  project/list, tag, and keyword allow/deny filters, writes the resulting
  `task_scope_policy` audit to manifest.json, and emits profile gap events when
  offline input is missing or every candidate task is filtered by policy. Those
  filters only narrow the user-authorized collection scope; investment-task
  classification still belongs to the task-calendar-investor lens.

  Write exactly the JSON array printed by that command to the result file
  provided by SoulMirror. Each item should keep a stable `id`, visible task
  planning fields such as project/status/priority/timezone/repeat/reminders/
  checklist counts, and a `data` object with the raw task fields. Do not write
  lake/ticktick/events.jsonl, manifest.json, or SUMMARY.md from the skill; the
  SoulMirror daemon will diff the snapshot and append events itself.

  Only after successfully writing a JSON array should the final reply be:
    COLLECTED <number-of-records>
