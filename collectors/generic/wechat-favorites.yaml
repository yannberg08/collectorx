apiVersion: collectorx/v1
kind: Collector
id: wechat-favorites
display_name: 微信收藏与公众号文章
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: generic
owner_scope: personal
skill: wechat-favorites

scope:
  collects:
    - favorite_items
    - article_refs
    - titles
    - authors
    - urls
    - saved_at
    - action_type
    - source_account
    - action_coverage_manifest
    - field_coverage_manifest
    - article_surface_summary
    - source_audit_manifest
    - content_policy_manifest
    - archive_member_provenance
  excludes:
    - public_account_full_crawl
    - non_owner_read_history
    - credentials
    - archive_path_traversal_members
    - windows_drive_path_archive_members

description: |
  微信收藏和公众号文章动作的通用采集器。它采用户自己的收藏、保存、阅读、转发和文章指针；
  支持本地文件、导出目录和 ZIP 授权包，并在 manifest 中报告动作覆盖、字段覆盖、文章可用面、
  来源审计、内容策略和 ZIP 成员溯源。
  wechat-article-favorites lens 只筛投资类公众号和炒股文章。
