apiVersion: collectorx/v1
kind: Collector
id: notes
display_name: 笔记应用
refresh_interval: 24h
mode: snapshot
armed: false

# 采集器使用的skill
skill: notes-collector

scope:
  collects:
    - note_title
    - note_content_preview
    - note_tags
    - note_path_or_url
    - source_app
    - platform_coverage_manifest
    - field_coverage_manifest
    - content_policy_manifest
    - source_audit_manifest
    - archive_member_provenance
    - path_level_collection_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
  excludes:
    - note_service_tokens
    - unrelated_investment_classification
    - wiki_conclusions
    - archive_path_traversal_members
    - windows_drive_path_archive_members

# 采集逻辑由 skill 定义。
# skill 会处理：Notion API、Obsidian 本地 vault、有道云/印象笔记/Markdown/HTML/JSON/ZIP 授权导出。
# generic notes 只进入 lake/notes/events.jsonl；manifest 记录字段覆盖、内容策略、
# 逐输入来源审计、ZIP 跳过原因和路径安全边界；投资笔记由 investment-notes lens 筛选。
