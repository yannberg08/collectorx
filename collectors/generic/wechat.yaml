apiVersion: collectorx/v1
kind: Collector
id: wechat
display_name: 微信聊天记录
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
event_template: "[{time}] 〈{sender}〉: {text}"
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false

# 采集器使用的skill
skill: wechat-export

# 采集逻辑由skill定义
# skill会处理：数据库解密、数据查询、数据导出
