apiVersion: collectorx/v1
kind: Collector
id: wechat
display_name: 微信聊天记录
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
event_template: "[{time}] 〈{sender}〉: {text}"
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false

prompt: |
  使用wechat-export skill导出微信聊天记录。
  解析JSON格式，提取：sender/chat/time/content
  输出格式：JSON数组
