apiVersion: collectorx/v1
kind: Collector
id: wechat
display_name: 微信聊天记录
refresh_interval: 30m
retention: 14d
mode: incremental
time_field: time
event_template: "[{time}] 〈{sender}〉: {text}"
group_by: chat
initial_window: 24h
backfill:
  span: 90d
  page: 5000
armed: false

# 采集器使用的skill
skill: wechat-export

scope:
  collects:
    - owner_relevant_private_chat_messages
    - explicit_or_active_group_messages
    - chat_name
    - sender
    - message_time
    - message_text
    - field_coverage_manifest
    - filter_policy_manifest
    - source_audit_manifest
    - generic_to_lens_evidence_policy
    - validator_safe_preflight_gap_package
    - validator_safe_no_message_gap_package
    - message_event_count
    - usable_event_count
    - gap_event_count
    - data_quality_gap_routing
  excludes:
    - wechat_password
    - encryption_keys
    - cookies
    - tokens
    - raw_database_pages
    - unparticipated_groups_by_default
    - direct_investment_conclusions

# 采集逻辑由skill定义。
# skill会处理：数据库解密、数据查询、CollectorX 标准包输出、前置条件/空消息 data-quality gap 包。
# generic wechat 只进入 lake/wechat/events.jsonl；投资讨论由 wechat-investment-dialogue lens 筛选。
