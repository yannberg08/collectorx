apiVersion: collectorx/v1
kind: Collector
id: financial-news-usage
display_name: 财经资讯使用痕迹
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true
skill: financial-news-usage

scope:
  channels:
    - cls
    - wallstreetcn
    - gelonghui
  collects:
    - read_history
    - favorites
    - subscriptions
    - searches
    - alerts
    - platform_coverage_manifest
    - action_coverage_manifest
    - usage_topic_manifest
    - field_coverage_manifest
    - usage_surface_summary
    - source_audit_manifest
    - content_policy_manifest
    - usage_boundary_proof_manifest
    - archive_member_provenance
    - browser_history_domain_filtered_events
    - path_level_collection_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
  excludes:
    - public_news_full_crawl
    - platform_wide_data
    - credentials
    - archive_path_traversal_members
    - windows_drive_path_archive_members
    - public_news_as_personal_fact

description: |
  财经资讯 App 是投资垂直通道，但只采用户自己的阅读、收藏、订阅、搜索和提醒动作。
  支持用户授权导出文件、ZIP 包、保存页面和浏览器历史副本，并在 manifest 中报告平台/动作覆盖、
  主题覆盖、字段覆盖、使用痕迹可用面、逐输入来源审计、跳过原因、内容/证据边界和使用边界证明。
  公共新闻全文库属于 FinClaw research tools，不进个人证据湖。
