apiVersion: collectorx/v1
kind: Collector
id: financial-news-usage
display_name: 财经资讯使用痕迹
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true
skill: financial-news-usage

scope:
  channels:
    - cls
    - wallstreetcn
    - gelonghui
    - authorized_browser_history_copy
    - authorized_browser_history_zip_member
  collects:
    - read_history
    - favorites
    - subscriptions
    - searches
    - alerts
    - query_terms
    - subscription_targets
    - alert_conditions
    - notification_channels
    - trigger_sources
    - referrers
    - session_ids
    - dwell_seconds
    - browser_transition_types
    - safari_browser_history
    - chromium_browser_history
    - browser_history_source_app_counts
    - platform_coverage_manifest
    - action_coverage_manifest
    - usage_topic_manifest
    - field_coverage_manifest
    - usage_surface_summary
    - usage_behavior_summary
    - source_audit_manifest
    - scope_policy_authorization_filters
    - scope_policy_filter_reason_counts
    - scope_policy_filtered_all_gap_package
    - usable_event_count
    - usage_event_count
    - gap_event_count
    - business_data_quality_wiki_readiness_gates
    - content_policy_manifest
    - usage_boundary_proof_manifest
    - archive_member_provenance
    - browser_history_domain_filtered_events
    - path_level_collection_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
  excludes:
    - public_news_full_crawl
    - platform_wide_data
    - credentials
    - archive_path_traversal_members
    - windows_drive_path_archive_members
    - public_news_as_personal_fact

description: |
  财经资讯 App 是投资垂直通道，但只采用户自己的阅读、收藏、订阅、搜索和提醒动作。
  支持用户授权导出文件、ZIP 包、保存页面、直接浏览器历史副本和 ZIP 包内浏览器历史成员，并在 manifest 中报告平台/动作覆盖、
  主题覆盖、字段覆盖、行为强度、使用痕迹可用面、逐输入来源审计、平台/动作/来源应用/域名/主题/关键词授权范围过滤、
  filtered-all gap 包、业务/数据质量/Wiki 入湖门禁、跳过原因、内容/证据边界和使用边界证明。
  公共新闻全文库属于 FinClaw research tools，不进个人证据湖。
