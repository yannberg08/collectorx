apiVersion: collectorx/v1
kind: Collector
id: china-wealth-assets
display_name: 中国基金理财资产
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true
skill: china-wealth-assets

scope:
  channels:
    - alipay
    - tiantian-fund
    - danjuan
    - qieman
    - bank-wealth
    - authorized_browser_network_export_har
    - authorized_pdf_statement
    - authorized_export_zip
  collects:
    - asset_snapshots
    - fund_holdings
    - wealth_holdings
    - subscriptions
    - redemptions
    - profit_loss
    - field_coverage
    - asset_value_summary
    - account_boundary_summary
    - asset_boundary_proof
    - asset_surface_summary
    - currency_summary
    - transaction_surface_summary
    - scope_policy_audit
    - scope_policy_filtered_all_gap_package
    - no_input_gap_package
    - business_lake_readiness_gate
    - data_quality_lake_readiness_gate
    - investor_wiki_evidence_readiness_gate
    - source_audit
    - pdf_statement_audit
    - browser_network_response_audit
    - archive_member_provenance
  excludes:
    - payment_password
    - bank_password
    - request_headers
    - request_cookies
    - authorization_headers
    - request_url_query_strings
    - consumption_records
    - non_investment_payments
    - archive_path_traversal_members

description: |
  采支付宝基金、天天基金、蛋卷、且慢、银行理财等非股票账户资产边界，
  输出标准 CollectorX lake 包与投资 Wiki 证据包。它只处理用户授权的
  只读界面、导出文件、旧式 `.xls`/HTML 表格、PDF 官方账单、HAR 浏览器网络响应或 ZIP 包；HAR 只读取
  投资/基金/理财平台域名白名单内的响应体，不写入请求头、Cookie、
  Authorization 或 URL 查询串，也不碰支付和银行凭证。manifest 会报告字段覆盖、
  平台覆盖、账户边界、资产边界证明强度、资产面、币种、交易方向、授权范围策略、
  no-input/filtered-all gap 包、业务 Lake / 数据质量 Lake / Investor Wiki evidence
  readiness gate、PDF/HAR/来源审计和本次输入内的资产金额汇总，但不声明完整资产边界。
