apiVersion: collectorx/v1
kind: Collector
id: xueqiu-investor-activity
display_name: 雪球投资者活动
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true
skill: xueqiu-investor-activity

scope:
  channels:
    - xueqiu
    - authorized_browser_network_export_har
    - authorized_browser_history_copy
    - authorized_export_zip
  collects:
    - watchlists
    - followed_users
    - followed_portfolios
    - posts
    - comments
    - favorites
    - owner_portfolio_rebalances
    - browser_history_visits
    - browser_history_source_apps
    - visit_typed_counts
    - browser_transition_types
    - archive_member_provenance
    - source_audit
    - pagination_marker_audit
    - browser_network_response_audit
    - browser_history_domain_filtering_audit
    - scope_policy_audit
    - scope_policy_filtered_all_readiness
    - field_coverage
    - activity_boundary_proof
    - pagination_completeness_summary
  excludes:
    - platform_wide_sentiment
    - other_users_full_timelines
    - broker_confirmed_trades
    - credentials
    - request_headers
    - request_cookies
    - authorization_headers
    - request_url_query_strings
    - archive_path_traversal_members

description: |
  雪球是投资垂直采集器。它采用户自己的雪球活动和关注池，输出标准
  CollectorX lake 包与投资 Wiki 证据包；支持 JSON/CSV/Excel/HTML/TXT/HAR/ZIP
  授权导出，也支持用户授权复制的 Chromium/Safari 浏览器历史副本。HAR 只读取
  xueqiu.com 响应体且不写入请求头、Cookie、Authorization 或 URL 查询串；浏览器历史
  只保留 xueqiu.com 域名访问记录、来源浏览器、访问/输入次数和 transition 类型；ZIP
  包保留 archive.zip::member 来源并跳过路径穿越成员。manifest 记录输入、HAR、浏览器
  历史、ZIP、分页标记、字段覆盖、活动面覆盖证明和分页完整性摘要。
  可用 activity、source_surface、source_app、domain、symbol、author、keyword
  授权范围策略在写入 Lake 前过滤，并把 filtered-all 状态写入 manifest。
  不能当券商强交易事实，也不爬全站舆情。
