apiVersion: collectorx/v1
kind: Collector
id: pro-terminal-usage
display_name: 专业终端使用痕迹
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true
skill: pro-terminal-usage

scope:
  channels:
    - wind
    - choice
    - ifind
    - bloomberg
  collects:
    - workspaces
    - watchlists
    - searches
    - downloads
    - model_templates
    - factor_attention
    - datasets
    - fields
    - function_codes
    - query_terms
    - query_parameters
    - export_paths
    - export_row_counts
    - workspace_ids
    - template_ids
    - object_count_metrics
    - terminal_coverage_manifest
    - activity_coverage_manifest
    - workflow_field_coverage_manifest
    - workflow_topics
    - workflow_topic_summary
    - workflow_surface_summary
    - workflow_intensity_summary
    - workflow_boundary_proof
    - usable_event_count
    - workflow_event_count
    - gap_event_count
    - business_data_quality_wiki_readiness_gates
    - terminal_activity_workspace_project_dataset_field_keyword_scope_policy
    - scope_policy_filtered_all_readiness
    - filtered_all_data_quality_gap_package
    - no_input_data_quality_gap_package
    - source_audit_manifest
    - archive_member_provenance
    - path_level_collection_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
    - license_boundary_policy
  excludes:
    - vendor_database_mirror
    - licensed_content_redistribution
    - credentials
    - archive_path_traversal_members
    - windows_drive_path_archive_members

description: |
  专业终端是投资垂直工作流源。只采用户工作台、搜索、自选和模型使用痕迹，
  支持授权 CSV/JSON/Excel/HTML/TXT/LOG/ZIP 工作流包，并报告终端/活动/字段覆盖、
  工作流主题面谱、工作流可用面、工作流强度与血缘摘要、可用/工作流/gap 计数、
  业务湖/数据质量湖/Wiki readiness gates、终端/活动/工作区/项目/数据集/字段/关键词授权范围过滤、
  validator-safe filtered-all/no-input data-quality gap package、统一工作流边界证明、逐输入来源审计、跳过原因和许可边界。
  不复制厂商数据库内容。
