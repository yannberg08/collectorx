apiVersion: collectorx/v1
kind: Collector
id: xueqiu-watchlist
display_name: 雪球关注列表
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true

skill: xueqiu-watchlist

scope:
  channels:
    - xueqiu
    - authorized_export_zip
  collects:
    - watchlist_symbols
    - watchlist_names
    - watchlist_groups
    - watchlist_tags
    - watchlist_notes
    - followed_time
    - archive_member_provenance
    - source_audit
    - scope_policy_audit
    - scope_policy_filtered_all_gap_package
    - no_input_gap_package
    - xueqiu_watchlist_boundary_proof
    - field_coverage
  excludes:
    - credentials
    - cookies
    - tokens
    - sessions
    - posts
    - comments
    - favorites
    - portfolio_rebalances
    - broker_confirmed_trades
    - archive_path_traversal_members

description: |
  雪球关注列表是投资垂直关注池源。它只采用户授权导出的雪球关注/自选列表，
  用于 FinClaw 判断关注宇宙；发帖、评论、收藏和组合调仓由
  `xueqiu-investor-activity` 采集。manifest 记录输入、ZIP、过滤、授权范围策略、
  filtered-all/no-input gap package、关注池边界证明和字段覆盖审计，券商强交易事实必须来自交易类采集器。

prompt: |
  运行：
    python3 skills/xueqiu-watchlist/scripts/xueqiu_query.py collect \
      --input <用户授权的雪球关注列表导出文件或目录> \
      --out-dir <输出目录>

  输入支持 CSV/TSV、JSON/JSONL/NDJSON、XLSX/XLSM、HTML、Markdown、TXT。
  也支持 ZIP 包，保留 archive.zip::member 来源并跳过路径穿越成员。
  可用 --allow-symbol/--deny-symbol、--allow-market/--deny-market、
  --allow-group/--deny-group、--allow-industry/--deny-industry、
  --allow-tag/--deny-tag、--allow-keyword/--deny-keyword 收窄用户授权范围。
  无输入或 filtered-all 时输出可验证 profile gap package，不伪造关注池记录。
  输出 collectorx.event.v1 到 lake/xueqiu-watchlist/events.jsonl，并写入 manifest.json。
  关注列表只作为 attention-universe 证据，后续必须与雪球活动、券商交易、
  研报、笔记和复盘交叉验证。
