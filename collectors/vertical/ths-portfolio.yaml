apiVersion: collectorx/v1
kind: Collector
id: ths-portfolio
display_name: 同花顺交割单
refresh_interval: 24h
mode: snapshot
time_field: date
armed: false

# 同花顺交割单采集
# 用户从同花顺APP导出CSV文件，然后用这个采集器解析
# 解析字段：成交日期、证券代码、证券名称、买卖方向、成交价格、成交数量、成交金额

prompt: |
  解析同花顺导出的交割单CSV文件。
  文件路径：~/Downloads/交割单.csv
  提取字段：date/code/name/direction/price/quantity/amount
  输出格式：JSON数组
