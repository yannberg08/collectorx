apiVersion: collectorx/v1
kind: Collector
id: hk-us-brokerage
display_name: 港美股券商
refresh_interval: 24h
mode: snapshot
time_field: time
armed: false
category: vertical
owner_scope: personal
local_only: true
skill: hk-us-brokerage

scope:
  channels:
    - futu
    - tiger
    - ibkr
  collects:
    - assets
    - positions
    - executions
    - orders
    - cashflows
    - dividends
    - fx
    - margin
    - tax
    - settlement_fields
    - broker_coverage_manifest
    - trade_surface_coverage_manifest
    - field_coverage_manifest
    - strong_trade_surface_summary
    - account_boundary_summary
    - currency_market_summary
    - fee_tax_margin_summary
    - asset_value_summary
    - cashflow_activity_summary
    - income_return_summary
    - order_execution_summary
    - brokerage_boundary_proof
    - source_audit_manifest
    - scope_policy_authorization_filters
    - scope_policy_filter_reason_counts
    - scope_policy_filtered_all_gap_package
    - no_input_gap_package
    - archive_member_provenance
    - path_level_collection_audit
    - skipped_file_reason_counts
    - skipped_archive_member_reason_counts
    - read_only_evidence_policy
  excludes:
    - login_password
    - trading_password
    - place_order
    - cancel_order
    - community_discussions
    - archive_path_traversal_members
    - windows_drive_path_archive_members

description: |
  港美股券商是投资垂直强交易源。支持用户授权 CSV/JSON/Excel/ZIP 只读导出包。
  manifest 会报告富途/老虎/盈透、七类强交易表、关键金额字段覆盖、资产数值汇总、
  账户边界、币种市场、费用税费保证金、现金流活动、收益回报、订单执行、券商/账户/交易表/标的/市场/币种/关键词授权范围过滤、
  filtered-all/no-input gap package、统一券商边界证明、逐输入来源审计、跳过原因和只读证据边界。
  后续按富途、老虎、盈透逐个做真实账号只读采集和真机验证。
